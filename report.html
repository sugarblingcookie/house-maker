<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>임장 레포트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="data.js"></script>
<style>
/* ══════════════════════════════════════
   CSS 변수 — 라이트 테마 (기본)
══════════════════════════════════════ */
:root {
  --body-bg:        #f5f5f0;
  --body-text:      #1a1a1a;
  --page-bg:        #ffffff;
  --page-border:    #e0e0d8;
  --accent:         #2d5016;
  --accent-mid:     #4a7c20;
  --accent-bg:      #f0f7e8;
  --cover-line:     #2d5016;
  --meta-label:     #999999;
  --meta-value:     #333333;
  --meta-divider:   #e8e8e0;
  --text2:          #333333;
  --text3:          #555555;
  --text4:          #888888;
  --text5:          #bbbbbb;
  --card-bg:        #fafaf8;
  --card-border:    #e8e8e0;
  --tbl-hdr-bg:     #f5f5f0;
  --tbl-hdr-bg2:    #f0f0ea;
  --tbl-hdr-bg3:    #f8f8f4;
  --tbl-hdr-text:   #666666;
  --tbl-hdr-text2:  #999999;
  --tbl-hdr-border: #d0d0c8;
  --tbl-row-border: #f0f0e8;
  --apt-main-bg:    #ffffff;
  --apt-gap-bg:     #f5f5f0;
  --img-border:     #e0e0d8;
  --entry-border:   #f0f0e8;
  --close-bg:       #ffffff;
  --close-text:     #555555;
  --close-border:   #d0d0c8;
  --close-hover:    #f5f5f0;
  --footer-text:    #bbbbbb;
  --empty-text:     #bbbbbb;

  /* 등급 색상 */
  --grade-s:        #16a34a;
  --grade-a:        #b45309;
  --grade-b:        #c2410c;
  --grade-c:        #9ca3af;
  --grade-s-bg:     #f0fdf4;
  --grade-a-bg:     #fffbeb;
  --grade-b-bg:     #fff7ed;
  --grade-c-bg:     #f9fafb;
  --grade-none-col: #9ca3af;
  --grade-none-bdr: #d1d5db;
  --grade-none-bg:  #f9fafb;
}

/* ══════════════════════════════════════
   CSS 변수 — 다크 테마
══════════════════════════════════════ */
body.dark {
  --body-bg:        #0f0f11;
  --body-text:      #f0f0f0;
  --page-bg:        #18181c;
  --page-border:    rgba(255,255,255,0.07);
  --accent:         #c8f064;
  --accent-mid:     #a0d040;
  --accent-bg:      rgba(200,240,100,0.08);
  --cover-line:     #c8f064;
  --meta-label:     #5a5a6a;
  --meta-value:     #d0d0d8;
  --meta-divider:   rgba(255,255,255,0.08);
  --text2:          #c8c8d4;
  --text3:          #9a9aaa;
  --text4:          #9a9aaa;
  --text5:          #5a5a6a;
  --card-bg:        #222228;
  --card-border:    rgba(255,255,255,0.07);
  --tbl-hdr-bg:     #2a2a32;
  --tbl-hdr-bg2:    #222228;
  --tbl-hdr-bg3:    #1e1e26;
  --tbl-hdr-text:   #9a9aaa;
  --tbl-hdr-text2:  #5a5a6a;
  --tbl-hdr-border: rgba(255,255,255,0.10);
  --tbl-row-border: rgba(255,255,255,0.05);
  --apt-main-bg:    #1e1e24;
  --apt-gap-bg:     #0f0f11;
  --img-border:     rgba(255,255,255,0.10);
  --entry-border:   rgba(255,255,255,0.06);
  --close-bg:       #222228;
  --close-text:     #9a9aaa;
  --close-border:   rgba(255,255,255,0.13);
  --close-hover:    #2a2a32;
  --footer-text:    #5a5a6a;
  --empty-text:     #5a5a6a;

  /* 등급 색상 */
  --grade-s:        #4ade80;
  --grade-a:        #f0c040;
  --grade-b:        #f5a623;
  --grade-c:        #9a9aaa;
  --grade-s-bg:     rgba(74,222,128,0.10);
  --grade-a-bg:     rgba(240,192,64,0.10);
  --grade-b-bg:     rgba(245,166,35,0.10);
  --grade-c-bg:     rgba(154,154,170,0.08);
  --grade-none-col: #5a5a6a;
  --grade-none-bdr: rgba(255,255,255,0.13);
  --grade-none-bg:  rgba(255,255,255,0.04);
}

/* ══════════════════════════════════════
   기본 레이아웃
══════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--body-bg);
  color: var(--body-text);
  font-size: 14px;
  line-height: 1.65;
  transition: background 0.25s, color 0.25s;
}

.page-wrap {
  max-width: 820px;
  margin: 32px auto;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ── 공통 섹션 블록 ── */
.rpt-page {
  background: var(--page-bg);
  border: 1px solid var(--page-border);
  border-radius: 4px;
  margin-bottom: 16px;
  padding: 48px 52px;
  min-height: 80px;
  transition: background 0.25s, border-color 0.25s;
}

/* ── 표지 ── */
.cover-page {
  min-height: 340px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-top: 6px solid var(--cover-line);
}
.cover-tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent-mid);
  margin-bottom: 18px;
}
.cover-title {
  font-size: 34px;
  font-weight: 700;
  color: var(--body-text);
  line-height: 1.25;
  margin-bottom: 28px;
}
.cover-meta {
  display: flex;
  flex-direction: column;
  gap: 6px;
  border-top: 1px solid var(--meta-divider);
  padding-top: 22px;
}
.cover-meta-row {
  display: flex;
  gap: 24px;
  font-size: 12px;
}
.cover-meta-label { color: var(--meta-label); min-width: 72px; }
.cover-meta-value { color: var(--meta-value); font-weight: 500; }

/* ── 섹션 헤더 ── */
.sec-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--accent);
}
.sec-num {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--accent-mid);
  background: var(--accent-bg);
  padding: 3px 8px;
  border-radius: 4px;
}
.sec-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--body-text);
}

/* ── 서브 섹션 헤더 ── */
.subsec-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent-mid);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 10px;
  margin-top: 24px;
}
.subsec-title:first-of-type { margin-top: 0; }

/* ── 위치&생활권역 ── */
.loc-row {
  display: flex;
  gap: 24px;
  align-items: flex-start;
  flex-wrap: wrap;
}
.loc-photo { flex: 0 0 auto; width: 260px; }
.loc-photo img {
  width: 100%;
  border-radius: 6px;
  border: 1px solid var(--img-border);
  display: block;
}
.loc-memo {
  flex: 1;
  min-width: 180px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.8;
  white-space: pre-wrap;
}

/* ── 등급 뱃지 ── */
.grade-s { color: var(--grade-s); }
.grade-a { color: var(--grade-a); }
.grade-b { color: var(--grade-b); }
.grade-c { color: var(--grade-c); }

.grade-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 42px;
  height: 42px;
  border-radius: 6px;
  font-size: 22px;
  font-weight: 700;
  border: 2px solid;
}
.grade-badge.grade-s { border-color: var(--grade-s); background: var(--grade-s-bg); }
.grade-badge.grade-a { border-color: var(--grade-a); background: var(--grade-a-bg); }
.grade-badge.grade-b { border-color: var(--grade-b); background: var(--grade-b-bg); }
.grade-badge.grade-c { border-color: var(--grade-c); background: var(--grade-c-bg); }
.grade-badge.grade-none {
  border-color: var(--grade-none-bdr);
  background: var(--grade-none-bg);
  color: var(--grade-none-col);
  font-size: 14px;
}

/* ── 종합 등급표 ── */
.summary-grade-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.summary-grade-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 16px 8px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 8px;
}
.summary-grade-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text4);
  letter-spacing: 0.05em;
}

/* ── 입지분석 카드 ── */
.analysis-row {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.analysis-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 6px;
  padding: 12px 16px;
  flex: 1;
  min-width: 120px;
}
.analysis-card-label {
  font-size: 10px;
  color: var(--text4);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.analysis-card-value {
  font-size: 13px;
  font-weight: 600;
  color: var(--body-text);
  font-family: 'DM Mono', monospace;
}
.subsec-memo {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.8;
  white-space: pre-wrap;
  margin-top: 8px;
}

/* ── 교통표 ── */
.traffic-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 8px;
}
.traffic-table th {
  text-align: left;
  padding: 8px 10px;
  background: var(--tbl-hdr-bg);
  border-bottom: 1px solid var(--tbl-hdr-border);
  font-size: 10px;
  font-weight: 600;
  color: var(--tbl-hdr-text);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.traffic-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--tbl-row-border);
  color: var(--text3);
}
.traffic-table td.dest-name { font-weight: 600; color: var(--body-text); }
.traffic-table td.dest-memo { color: var(--text4); }
.traffic-table tr:last-child td { border-bottom: none; }

/* ── 이미지+메모 행 ── */
.photo-memo-row {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.pm-photo { flex: 0 0 auto; width: 220px; }
.pm-photo img {
  width: 100%;
  border-radius: 6px;
  border: 1px solid var(--img-border);
  display: block;
}
.pm-memo {
  flex: 1;
  min-width: 140px;
  font-size: 12px;
  color: var(--text3);
  line-height: 1.8;
  white-space: pre-wrap;
}

/* ── 미니 테이블 ── */
.mini-table {
  width: 100%;
  max-width: 300px;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 10px;
}
.mini-table th {
  text-align: left;
  padding: 7px 10px;
  background: var(--tbl-hdr-bg);
  border-bottom: 1px solid var(--tbl-hdr-border);
  font-size: 10px;
  font-weight: 600;
  color: var(--tbl-hdr-text);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.mini-table td {
  padding: 7px 10px;
  border-bottom: 1px solid var(--tbl-row-border);
  color: var(--text3);
}
.mini-table td:first-child { color: var(--body-text); }
.mini-table tr:last-child td { border-bottom: none; }

/* ── 시세 정리 테이블 ── */
.apt-table-wrap { overflow-x: auto; }
.apt-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  min-width: 600px;
}
.apt-table thead th {
  text-align: left;
  padding: 9px 12px;
  background: var(--tbl-hdr-bg2);
  border-bottom: 2px solid var(--tbl-hdr-border);
  font-size: 10px;
  font-weight: 700;
  color: var(--tbl-hdr-text);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
}
.apt-table tr.apt-main td {
  padding: 11px 12px;
  background: var(--apt-main-bg);
  border-bottom: 2px solid var(--accent);
  font-weight: 600;
  color: var(--body-text);
  font-size: 13px;
}
.apt-table tr.apt-main td:first-child {
  color: var(--accent);
  font-size: 14px;
  white-space: normal;
  word-break: keep-all;
}
.apt-table tr.apt-sub-hdr th {
  text-align: left;
  padding: 7px 12px;
  background: var(--tbl-hdr-bg3);
  border-bottom: 1px solid var(--tbl-row-border);
  border-top: 1px solid var(--tbl-row-border);
  font-size: 10px;
  font-weight: 600;
  color: var(--tbl-hdr-text2);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.apt-table tr.apt-sub td {
  padding: 7px 12px;
  border-bottom: 1px solid var(--tbl-row-border);
  color: var(--text3);
  font-size: 11px;
  vertical-align: middle;
}
.apt-table tr.apt-sub:last-of-type td { border-bottom: none; }
.apt-table tr.apt-gap td { height: 10px; background: var(--apt-gap-bg); border: none; }
.sub-note { color: var(--text5); font-size: 10px; }
.mono { font-family: 'DM Mono', monospace; }

/* ── 그래프/임장 항목 ── */
.report-entry {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  flex-wrap: wrap;
  padding: 16px 0;
  border-bottom: 1px solid var(--entry-border);
}
.report-entry:last-child { border-bottom: none; }
.entry-num {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent-mid);
  margin-bottom: 8px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.entry-photo { flex: 0 0 auto; width: 240px; }
.entry-photo img {
  width: 100%;
  border-radius: 6px;
  border: 1px solid var(--img-border);
  display: block;
  max-height: 200px;
  object-fit: cover;
}
.entry-memo {
  flex: 1;
  min-width: 200px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.8;
  white-space: pre-wrap;
}
.entry-memo-empty { color: var(--text5); font-style: italic; }

/* ── 결론 ── */
.conclusion-text {
  font-size: 13px;
  color: var(--body-text);
  line-height: 1.9;
  white-space: pre-wrap;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 6px;
  padding: 20px 24px;
  min-height: 80px;
}
.conclusion-empty { color: var(--text5); font-style: italic; }

/* ── 하단 워터마크 ── */
.rpt-footer {
  text-align: center;
  font-size: 10px;
  color: var(--footer-text);
  padding: 12px;
  letter-spacing: 0.06em;
}

/* ── 빈 안내 ── */
.empty-notice {
  font-size: 12px;
  color: var(--empty-text);
  font-style: italic;
  padding: 12px 0;
}

/* ── 툴바 (화면 전용) ── */
.print-toolbar {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  gap: 8px;
  z-index: 999;
}
.print-btn {
  background: var(--accent);
  color: #0f0f11;
  border: none;
  border-radius: 8px;
  padding: 12px 22px;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  transition: opacity 0.15s;
}
.print-btn:hover { opacity: 0.85; }
.close-btn, .theme-btn {
  background: var(--close-bg);
  color: var(--close-text);
  border: 1px solid var(--close-border);
  border-radius: 8px;
  padding: 12px 18px;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  transition: background 0.15s;
}
.close-btn:hover, .theme-btn:hover { background: var(--close-hover); }

/* ── @media print — 항상 라이트 테마 강제 ── */
@media print {
  @page {
    size: A4;
    margin: 20mm 18mm 20mm 18mm;
  }

  html, body {
    background: #f5f5f0 !important;
    color: #1a1a1a !important;
    /* 라이트 테마 변수 강제 */
    --body-bg: #f5f5f0 !important;
    --body-text: #1a1a1a !important;
    --page-bg: #ffffff !important;
    --page-border: #e0e0d8 !important;
    --accent: #2d5016 !important;
    --accent-mid: #4a7c20 !important;
    --accent-bg: #f0f7e8 !important;
    --cover-line: #2d5016 !important;
    --meta-label: #999999 !important;
    --meta-value: #333333 !important;
    --meta-divider: #e8e8e0 !important;
    --text2: #333333 !important;
    --text3: #555555 !important;
    --text4: #888888 !important;
    --text5: #bbbbbb !important;
    --card-bg: #fafaf8 !important;
    --card-border: #e8e8e0 !important;
    --tbl-hdr-bg: #f5f5f0 !important;
    --tbl-hdr-bg2: #f0f0ea !important;
    --tbl-hdr-bg3: #f8f8f4 !important;
    --tbl-hdr-text: #666666 !important;
    --tbl-hdr-text2: #999999 !important;
    --tbl-hdr-border: #d0d0c8 !important;
    --tbl-row-border: #f0f0e8 !important;
    --apt-main-bg: #ffffff !important;
    --apt-gap-bg: #f5f5f0 !important;
    --img-border: #e0e0d8 !important;
    --entry-border: #f0f0e8 !important;
    --footer-text: #bbbbbb !important;
    --empty-text: #bbbbbb !important;
    --grade-s: #16a34a !important;
    --grade-a: #b45309 !important;
    --grade-b: #c2410c !important;
    --grade-c: #9ca3af !important;
    --grade-s-bg: #f0fdf4 !important;
    --grade-a-bg: #fffbeb !important;
    --grade-b-bg: #fff7ed !important;
    --grade-c-bg: #f9fafb !important;
    --grade-none-col: #9ca3af !important;
    --grade-none-bdr: #d1d5db !important;
    --grade-none-bg: #f9fafb !important;
  }

  .print-toolbar { display: none !important; }

  .page-wrap { max-width: none; margin: 0; gap: 0; }

  .rpt-page {
    border: none !important;
    border-radius: 0 !important;
    margin-bottom: 0 !important;
    padding: 0 0 24mm 0 !important;
    page-break-after: always;
    break-after: page;
  }
  .rpt-page:last-of-type {
    page-break-after: avoid;
    break-after: avoid;
    padding-bottom: 0 !important;
  }
  .cover-page {
    page-break-after: always;
    break-after: page;
    min-height: auto;
    padding: 60mm 0 0 0 !important;
  }
  .rpt-footer { display: none; }
}
</style>
</head>
<body>

<div class="page-wrap" id="reportRoot">
  <div class="empty-notice" style="padding:60px 20px;text-align:center;">레포트를 불러오는 중...</div>
</div>

<div class="print-toolbar">
  <button class="theme-btn" id="themeToggleBtn" onclick="toggleTheme()">🌙 다크 모드</button>
  <button class="close-btn" onclick="window.close()">닫기</button>
  <button class="print-btn" onclick="window.print()">🖨️ PDF로 저장</button>
</div>

<script>
/* ══ 테마 토글 ══ */
function applyTheme(dark) {
  if (dark) {
    document.body.classList.add('dark');
    document.getElementById('themeToggleBtn').textContent = '☀️ 라이트 모드';
  } else {
    document.body.classList.remove('dark');
    document.getElementById('themeToggleBtn').textContent = '🌙 다크 모드';
  }
}
function toggleTheme() {
  const isDark = !document.body.classList.contains('dark');
  localStorage.setItem('rpt_theme', isDark ? 'dark' : 'light');
  applyTheme(isDark);
}
/* 저장된 테마 복원 */
(function() {
  applyTheme(localStorage.getItem('rpt_theme') === 'dark');
})();

/* ══ 유틸 ══ */
function parsePrice(val) {
  if (!val) return null;
  const n = parseFloat(String(val).replace(/[^0-9.]/g, ''));
  return isNaN(n) || n === 0 ? null : n;
}

function fmtHighPct(latest, high, isAtHigh) {
  if (isAtHigh) return `<span style="color:#16a34a;font-size:11px;font-weight:600;">▲ 고점</span>`;
  if (latest === null || high === null) return '<span style="color:#bbb;">—</span>';
  const pct = (latest - high) / high * 100;
  const sign = pct >= 0 ? '+' : '';
  const arrow = pct >= 0 ? '▲' : '▼';
  const color = pct >= 0 ? '#16a34a' : '#dc2626';
  return `<span style="color:${color};font-size:11px;font-weight:600;">${arrow} ${sign}${pct.toFixed(1)}%</span>`;
}

function gradeClass(g) {
  if (!g) return 'grade-none';
  return 'grade-' + g.toLowerCase();
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function shortRegion(full) {
  if (!full) return '—';
  const parts = full.trim().split(/\s+/);
  return parts[parts.length - 1] || full;
}
function getWorkData(folder) {
  const m = folder.memo || {};
  if (!m.work_region || !m.work_district) return null;
  const list = (typeof WORK_DATA !== 'undefined' && WORK_DATA[m.work_region]) || [];
  return list.find(d => d.district === m.work_district) || null;
}
function renderGradeBadge(grade) {
  if (!grade) return `<span class="grade-badge grade-none">—</span>`;
  return `<span class="grade-badge ${gradeClass(grade)}">${esc(grade)}</span>`;
}

/* ══ 표지 ══ */
function renderCover(folder) {
  return `
    <div class="rpt-page cover-page">
      <div class="cover-tag">임장 분석 레포트 · APT TRACKER</div>
      <div class="cover-title">${esc(folder.name)}</div>
      <div class="cover-meta">
        <div class="cover-meta-row">
          <span class="cover-meta-label">레포트 작성일</span>
          <span class="cover-meta-value">${todayStr()}</span>
        </div>
        <div class="cover-meta-row">
          <span class="cover-meta-label">폴더 생성일</span>
          <span class="cover-meta-value">${fmtDate(folder.createdAt)}</span>
        </div>
        <div class="cover-meta-row">
          <span class="cover-meta-label">저장 단지</span>
          <span class="cover-meta-value">${(folder.apartments||[]).length}개</span>
        </div>
      </div>
    </div>`;
}

/* ══ 위치&생활권역 ══ */
function renderLocation(folder) {
  const m = folder.memo || {};
  return `
    <div class="rpt-page">
      <div class="sec-header">
        <span class="sec-num">01</span>
        <span class="sec-title">위치 &amp; 생활권역</span>
      </div>
      <div class="loc-row">
        ${m.loc_photo ? `<div class="loc-photo"><img src="${m.loc_photo}" alt="위치 사진" /></div>` : ''}
        <div class="loc-memo">${m.loc_memo && m.loc_memo.trim() ? esc(m.loc_memo) : '<span class="entry-memo-empty">입력된 내용이 없습니다.</span>'}</div>
      </div>
    </div>`;
}

/* ══ 입지분석 ══ */
function renderAnalysis(folder) {
  const m = folder.memo || {};
  const workData     = getWorkData(folder);
  const workGrade    = workData ? workData.grade : null;
  const trafficGrade = m.traffic_grade || null;
  const schoolGrade  = m.school_grade  || null;
  const envGrade     = m.env_grade     || null;

  /* 종합 */
  const summaryHtml = `
    <div class="summary-grade-grid">
      <div class="summary-grade-cell"><div class="summary-grade-label">직장</div>${renderGradeBadge(workGrade)}</div>
      <div class="summary-grade-cell"><div class="summary-grade-label">교통</div>${renderGradeBadge(trafficGrade)}</div>
      <div class="summary-grade-cell"><div class="summary-grade-label">학군</div>${renderGradeBadge(schoolGrade)}</div>
      <div class="summary-grade-cell"><div class="summary-grade-label">환경</div>${renderGradeBadge(envGrade)}</div>
    </div>`;

  /* 직장 */
  let workHtml = `<div class="subsec-title">1. 직장</div>`;
  if (workData) {
    workHtml += `
      <div class="analysis-row">
        <div class="analysis-card">
          <div class="analysis-card-label">지역</div>
          <div class="analysis-card-value">${esc(m.work_region)} ${esc(m.work_district)}</div>
        </div>
        <div class="analysis-card">
          <div class="analysis-card-label">등급</div>
          <div class="analysis-card-value ${gradeClass(workData.grade)}" style="font-family:'Noto Sans KR',sans-serif;font-size:20px;">${esc(workData.grade)}</div>
        </div>
        <div class="analysis-card">
          <div class="analysis-card-label">종사자 수</div>
          <div class="analysis-card-value">${workData.workers.toLocaleString()}명</div>
        </div>
        <div class="analysis-card">
          <div class="analysis-card-label">사업체 수</div>
          <div class="analysis-card-value">${workData.businesses.toLocaleString()}개</div>
        </div>
      </div>`;
  } else {
    workHtml += `<p class="empty-notice">직장 정보가 입력되지 않았습니다.</p>`;
  }
  if (m.work && m.work.trim()) workHtml += `<div class="subsec-memo">${esc(m.work)}</div>`;

  /* 교통 */
  let trafficHtml = `<div class="subsec-title">2. 교통</div>`;
  if (trafficGrade) {
    trafficHtml += `
      <div class="analysis-row" style="margin-bottom:12px;">
        <div class="analysis-card" style="max-width:130px;">
          <div class="analysis-card-label">교통 등급</div>
          <div class="analysis-card-value ${gradeClass(trafficGrade)}" style="font-family:'Noto Sans KR',sans-serif;font-size:20px;">${esc(trafficGrade)}</div>
        </div>
      </div>`;
  }
  const tcFixed = [
    ['강남역',  m.tc_gangnam_time, m.tc_gangnam_tr, m.tc_gangnam_memo],
    ['시청역',  m.tc_sicho_time,   m.tc_sicho_tr,   m.tc_sicho_memo],
    ['여의도역', m.tc_yeouido_time, m.tc_yeouido_tr, m.tc_yeouido_memo],
  ];
  let customRows = [];
  try { customRows = JSON.parse(m.traffic_custom_rows || '[]'); } catch(e) {}
  const allTc = [...tcFixed, ...customRows.map(r => [r.dest, r.time, r.tr, r.memo])];
  if (allTc.some(r => r[1] || r[2] || r[3])) {
    trafficHtml += `
      <table class="traffic-table">
        <thead><tr><th>목적지</th><th>소요시간</th><th>환승 횟수</th><th>메모</th></tr></thead>
        <tbody>
          ${allTc.map(r => `
            <tr>
              <td class="dest-name">${esc(r[0])}</td>
              <td>${esc(r[1]) || '—'}</td>
              <td>${esc(r[2]) || '—'}</td>
              <td class="dest-memo">${esc(r[3]) || ''}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }
  if (m.traffic && m.traffic.trim()) trafficHtml += `<div class="subsec-memo" style="margin-top:12px;">${esc(m.traffic)}</div>`;

  /* 학군 */
  let schoolHtml = `<div class="subsec-title">3. 학군</div>`;
  if (schoolGrade) {
    schoolHtml += `
      <div class="analysis-row" style="margin-bottom:12px;">
        <div class="analysis-card" style="max-width:130px;">
          <div class="analysis-card-label">학군 등급</div>
          <div class="analysis-card-value ${gradeClass(schoolGrade)}" style="font-family:'Noto Sans KR',sans-serif;font-size:20px;">${esc(schoolGrade)}</div>
        </div>
      </div>`;
  }
  if (m.school_95 || m.school_90 || m.school_85) {
    schoolHtml += `
      <table class="mini-table" style="margin-bottom:12px;">
        <thead><tr><th>구분</th><th>갯수</th></tr></thead>
        <tbody>
          <tr><td>95% 이상</td><td>${esc(m.school_95)||'—'}</td></tr>
          <tr><td>90% 이상</td><td>${esc(m.school_90)||'—'}</td></tr>
          <tr><td>85% 이상</td><td>${esc(m.school_85)||'—'}</td></tr>
        </tbody>
      </table>`;
  }
  if (m.school_photo || m.school_photo_memo) {
    schoolHtml += `
      <div class="photo-memo-row">
        ${m.school_photo ? `<div class="pm-photo"><img src="${m.school_photo}" alt="학군 사진" /></div>` : ''}
        ${m.school_photo_memo ? `<div class="pm-memo">${esc(m.school_photo_memo)}</div>` : ''}
      </div>`;
  }

  /* 환경 */
  let envHtml = `<div class="subsec-title">4. 환경</div>`;
  if (envGrade) {
    envHtml += `
      <div class="analysis-row" style="margin-bottom:12px;">
        <div class="analysis-card" style="max-width:130px;">
          <div class="analysis-card-label">환경 등급</div>
          <div class="analysis-card-value ${gradeClass(envGrade)}" style="font-family:'Noto Sans KR',sans-serif;font-size:20px;">${esc(envGrade)}</div>
        </div>
      </div>`;
  }
  if (m.env_dept || m.env_mart || m.env_hospital) {
    envHtml += `
      <table class="mini-table" style="margin-bottom:12px;">
        <thead><tr><th>구분</th><th>갯수</th></tr></thead>
        <tbody>
          <tr><td>백화점</td><td>${esc(m.env_dept)||'—'}</td></tr>
          <tr><td>마트</td><td>${esc(m.env_mart)||'—'}</td></tr>
          <tr><td>종합병원</td><td>${esc(m.env_hospital)||'—'}</td></tr>
        </tbody>
      </table>`;
  }
  if (m.env_photo || m.env_photo_memo) {
    envHtml += `
      <div class="photo-memo-row">
        ${m.env_photo ? `<div class="pm-photo"><img src="${m.env_photo}" alt="환경 사진" /></div>` : ''}
        ${m.env_photo_memo ? `<div class="pm-memo">${esc(m.env_photo_memo)}</div>` : ''}
      </div>`;
  }

  return `
    <div class="rpt-page">
      <div class="sec-header">
        <span class="sec-num">02</span>
        <span class="sec-title">입지분석</span>
      </div>
      ${summaryHtml}${workHtml}${trafficHtml}${schoolHtml}${envHtml}
    </div>`;
}

/* ══ 시세 정리 ══ */
function renderSpreadsheet(folder) {
  const apts = folder.apartments || [];
  let rows = '';
  if (!apts.length) {
    rows = `<tr><td colspan="7" style="text-align:center;padding:24px;" class="empty-notice">저장된 아파트가 없습니다.</td></tr>`;
  } else {
    apts.forEach(apt => {
      const m = apt.manual || {};
      const areaStats = apt.areaStats || [];
      const buildInfo = apt.buildYear ? `<span style="font-size:11px;">${apt.buildYear}년<br><span style="color:var(--body-text2);font-weight:400;">(${apt.buildingAge}년차)</span></span>` : '—';
      rows += `<tr class="apt-gap"><td colspan="8"></td></tr>`;
      rows += `
        <tr class="apt-main">
          <td>${esc(apt.name)}</td>
          <td style="white-space:nowrap;">${esc(shortRegion(apt.regionName))}</td>
          <td>${buildInfo}</td>
          <td>${esc(m.totalUnits||'')||'—'}</td>
          <td>${esc(m.corridorType||'')||'—'}</td>
          <td>${(apt.trades||[]).length}건</td>
          <td colspan="2" style="font-size:11px;font-weight:400;">${esc(m.notes||'')}</td>
        </tr>
        <tr class="apt-sub-hdr">
          <th style="padding-left:20px;">└ 타입</th>
          <th style="width:52px;white-space:nowrap;">공급면적</th><th style="width:52px;white-space:nowrap;">세대수</th>
          <th style="white-space:nowrap;">최근 거래가</th><th style="white-space:nowrap;">3년 최고가</th><th style="white-space:nowrap;">고점대비</th>
          <th style="width:52px;white-space:nowrap;">방</th><th style="width:52px;white-space:nowrap;">화장실</th>
        </tr>`;
      areaStats.forEach(s => {
        const saved = (m.areas||{})[s.area] || {};
        const pyeong = Math.round(s.area / 3.3);
        let latestPrice = '—', latestDate = '';
        if (s.latestPrice && s.latestPrice !== '-') {
          latestPrice = s.latestPrice + '억';
          latestDate = s.latestDate || '';
        } else if (!s.latestPrice) {
          const ts = (apt.trades||[]).filter(t => Math.round(t.area) === s.area);
          if (ts.length) {
            const latest = [...ts].sort((a,b) => b.date.localeCompare(a.date))[0];
            latestPrice = (latest.price/10000).toFixed(2) + '억';
            latestDate = latest.date;
          }
        }
        const highPrice = s.highPrice ? s.highPrice + '억' : '—';
        const highNote  = s.isAtHigh ? '▲ 고점' : (s.highDate || '');
        rows += `
          <tr class="apt-sub">
            <td style="padding-left:20px;">${s.area}㎡ · ${pyeong}평</td>
            <td>${esc(saved.supply||'')||'—'}</td>
            <td>${esc(saved.units||'')||'—'}</td>
            <td class="mono">${latestPrice}${latestDate ? `<br><span class="sub-note">(${latestDate})</span>` : ''}</td>
            <td class="mono">${highPrice}${highNote ? `<br><span class="sub-note">${highNote}</span>` : ''}</td>
            <td class="mono">${fmtHighPct(parsePrice(s.latestPrice), parsePrice(s.highPrice), s.isAtHigh)}</td>
            <td>${esc(saved.rooms||'')||'—'}</td>
            <td>${esc(saved.bathrooms||'')||'—'}</td>
          </tr>`;
      });

      // 수동 추가 타입 행
      (m.customAreas || []).forEach(areaKey => {
        const saved = (m.areas||{})[areaKey] || {};
        const num = parseFloat(areaKey);
        const pyeong = !isNaN(num) && num > 0 ? Math.round(num / 3.3) : null;
        const latestPrice = esc(saved.manualLatestPrice || '') || '—';
        const highPrice   = esc(saved.manualHighPrice   || '') || '—';
        rows += `
          <tr class="apt-sub">
            <td style="padding-left:20px;">${esc(areaKey)}㎡${pyeong !== null ? ' · ' + pyeong + '평' : ''} <span style="color:#4a7c20;font-size:10px;">수동</span></td>
            <td>${esc(saved.supply||'')||'—'}</td>
            <td>${esc(saved.units||'')||'—'}</td>
            <td class="mono">${latestPrice}</td>
            <td class="mono">${highPrice}</td>
            <td class="mono">${fmtHighPct(parsePrice(saved.manualLatestPrice), parsePrice(saved.manualHighPrice), false)}</td>
            <td>${esc(saved.rooms||'')||'—'}</td>
            <td>${esc(saved.bathrooms||'')||'—'}</td>
          </tr>`;
      });
    });
  }
  return `
    <div class="rpt-page">
      <div class="sec-header">
        <span class="sec-num">03</span>
        <span class="sec-title">시세 정리</span>
      </div>
      <div class="apt-table-wrap">
        <table class="apt-table">
          <thead><tr>
            <th style="width:110px;">아파트명</th><th>지역</th><th style="width:90px;">건축연도</th>
            <th>전체세대수</th><th>복도형식</th><th>거래건수</th><th>메모</th><th></th>
          </tr></thead>
          <!-- 서브 헤더는 각 아파트 rows 내에 포함 -->
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

/* ══ 시세 그래프 ══ */
function renderGraphs(folder) {
  const graphs = folder.graphs || [];
  const content = !graphs.length
    ? `<p class="empty-notice">저장된 시세 그래프가 없습니다.</p>`
    : graphs.map((g, i) => `
        <div class="report-entry">
          <div style="flex:1;min-width:0;">
            <div class="entry-num">항목 ${i+1}</div>
            <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
              ${g.data ? `<div class="entry-photo"><img src="${g.data}" alt="시세 그래프 ${i+1}" /></div>` : ''}
              <div class="entry-memo">${g.report && g.report.trim() ? esc(g.report) : '<span class="entry-memo-empty">메모 없음</span>'}</div>
            </div>
          </div>
        </div>`).join('');
  return `
    <div class="rpt-page">
      <div class="sec-header">
        <span class="sec-num">04</span>
        <span class="sec-title">시세 그래프</span>
      </div>
      ${content}
    </div>`;
}

/* ══ 임장 보고서 ══ */
function renderPhotos(folder) {
  const photos = folder.photos || [];
  const content = !photos.length
    ? `<p class="empty-notice">저장된 임장 보고서가 없습니다.</p>`
    : photos.map((p, i) => `
        <div class="report-entry">
          <div style="flex:1;min-width:0;">
            <div class="entry-num">항목 ${i+1}${p.addedAt ? ' · ' + fmtDate(p.addedAt) : ''}</div>
            <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
              ${p.data ? `<div class="entry-photo"><img src="${p.data}" alt="임장 사진 ${i+1}" /></div>` : ''}
              <div class="entry-memo">${p.report && p.report.trim() ? esc(p.report) : '<span class="entry-memo-empty">메모 없음</span>'}</div>
            </div>
          </div>
        </div>`).join('');
  return `
    <div class="rpt-page">
      <div class="sec-header">
        <span class="sec-num">05</span>
        <span class="sec-title">임장 보고서</span>
      </div>
      ${content}
    </div>`;
}

/* ══ 결론 ══ */
function renderConclusion(folder) {
  const text = (folder.memo || {}).conclusion || '';
  return `
    <div class="rpt-page">
      <div class="sec-header">
        <span class="sec-num">06</span>
        <span class="sec-title">결론</span>
      </div>
      <div class="conclusion-text${!text.trim() ? ' conclusion-empty' : ''}">
        ${text.trim() ? esc(text) : '결론이 입력되지 않았습니다.'}
      </div>
    </div>`;
}

/* ══ 초기화 ══ */
function renderReport(folder) {
  document.getElementById('reportRoot').innerHTML = [
    renderCover(folder),
    renderLocation(folder),
    renderAnalysis(folder),
    renderSpreadsheet(folder),
    renderGraphs(folder),
    renderPhotos(folder),
    renderConclusion(folder),
    `<div class="rpt-footer">APT TRACKER · 레포트 작성일 ${todayStr()}</div>`
  ].join('');
  document.title = `임장 레포트 — ${folder.name} (${todayStr()})`;
}

(function() {
  const params = new URLSearchParams(location.search);
  const folderId = params.get('id');
  if (!folderId) {
    document.getElementById('reportRoot').innerHTML = '<div style="padding:60px 20px;text-align:center;" class="empty-notice">폴더 ID가 없습니다.<br>folder.html에서 레포트 내보내기 버튼을 눌러주세요.</div>';
    return;
  }
  const folder = getFolder(folderId);
  if (!folder) {
    document.getElementById('reportRoot').innerHTML = '<div style="padding:60px 20px;text-align:center;" class="empty-notice">폴더를 찾을 수 없습니다.</div>';
    return;
  }
  renderReport(folder);
})();
</script>
